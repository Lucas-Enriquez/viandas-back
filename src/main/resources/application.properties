spring.application.name=viandas-api

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/viandas}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=none

spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.repair-on-migrate=true

viandas.jwt.secret=${VIANDAS_JWT_SECRET:dev-secret-change-me-dev-secret-change-me}
viandas.jwt.expiration-minutes=${VIANDAS_JWT_EXPIRATION_MINUTES:15}
viandas.refresh.expiration-days=${VIANDAS_REFRESH_EXPIRATION_DAYS:30}
viandas.bootstrap.key=${VIANDAS_BOOTSTRAP_KEY:dev-bootstrap-key}
viandas.public-base-url=${VIANDAS_PUBLIC_BASE_URL:https://viandas.app}
viandas.google.client-id=${GOOGLE_CLIENT_ID:}
viandas.invitation.global-expiry-days=${VIANDAS_GLOBAL_INVITATION_EXPIRY_DAYS:365}
viandas.delivery.nearby-threshold-meters=${VIANDAS_NEARBY_THRESHOLD_METERS:600}
viandas.delivery.location-stale-minutes=${VIANDAS_LOCATION_STALE_MINUTES:20}
viandas.delivery.session-ttl-minutes=${VIANDAS_DELIVERY_SESSION_TTL_MINUTES:180}

viandas.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
viandas.cloudinary.api-key=${CLOUDINARY_API_KEY:}
viandas.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
viandas.cloudinary.products-folder=${CLOUDINARY_PRODUCTS_FOLDER:viandas/products}
viandas.cloudinary.max-image-bytes=${CLOUDINARY_MAX_IMAGE_BYTES:8388608}
